services:
  postgres:
    image: postgres:16-alpine
    container_name: clipfun-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clipfun
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - clipfun_pgdata:/var/lib/postgresql/data

volumes:
  clipfun_pgdata:
